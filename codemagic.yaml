workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: "com.example.ludo"
      java: 17
    scripts:
      - name: Install dependencies
        script: ./gradlew clean

      - name: Build APK
        script: ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk
